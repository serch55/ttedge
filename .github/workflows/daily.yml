name: Actualizar predicciones TT Edge (diario)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium para Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          TTEDGE_SESSION: ${{ secrets.TTEDGE_SESSION }}
          TTEDGE_TZ_OFFSET: "6"
        run: npm run scrape

      - name: Diagnostico si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: public/data/_debug.png
          if-no-files-found: ignore

      - name: Commit del resultado
        run: |
          git config user.name  "ttedge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/history.json
          git diff --staged --quiet || git commit -m "chore: predicciones $(date -u +%Y-%m-%d)"
          git push
