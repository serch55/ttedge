name: Actualizar predicciones TT Edge (diario)

on:
  schedule:
    # Horas en UTC. En verano España = UTC+2, así que:
    # 06:00 UTC=08:00 ES · 10:00 UTC=12:00 ES · 15:00 UTC=17:00 ES
    # (en invierno saldrían 1h antes: 07:00, 11:00, 16:00 ES)
    - cron: "0 6,10,15 * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write          # para poder commitear el JSON actualizado

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium para Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          TTEDGE_EMAIL: ${{ secrets.TTEDGE_EMAIL }}
          TTEDGE_PASSWORD: ${{ secrets.TTEDGE_PASSWORD }}
          TTEDGE_TZ_OFFSET: "6"
        run: npm run scrape

      - name: Diagnóstico si falla (captura de pantalla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: public/data/_debug.png
          if-no-files-found: ignore

      - name: Commit del resultado
        run: |
          git config user.name  "ttedge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/history.json public/data/_debug.json
          git diff --staged --quiet || git commit -m "chore: predicciones $(date -u +%Y-%m-%d)"
          git push
