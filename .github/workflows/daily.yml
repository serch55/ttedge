name: Actualizar predicciones TT Edge (diario)

on:
  schedule:
    # Cada hora en punto (hora UTC). El scraper ajusta el contenido a hora española.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Evita que dos ejecuciones se pisen (causaba el "remote rejected" al hacer push a la vez)
concurrency:
  group: scrape-ttedge
  cancel-in-progress: false

permissions:
  contents: write          # para poder commitear el JSON actualizado

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium para Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          TTEDGE_EMAIL: ${{ secrets.TTEDGE_EMAIL }}
          TTEDGE_PASSWORD: ${{ secrets.TTEDGE_PASSWORD }}
          TTEDGE_TZ_OFFSET: "6"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run scrape

      - name: Diagnóstico si falla (captura de pantalla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: public/data/_debug.png
          if-no-files-found: ignore

      - name: Commit del resultado
        run: |
          git config user.name  "ttedge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/history.json public/data/_debug.json
          git diff --staged --quiet && { echo "Sin cambios que guardar."; exit 0; }
          git commit -m "chore: predicciones $(date -u +%Y-%m-%d)"
          # Reintenta el push haciendo rebase si la rama avanzó mientras corríamos
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rechazado (intento $i), rebase quedándonos con nuestra versión…"
            git rebase --abort 2>/dev/null || true
            git fetch origin main || true
            git rebase -X theirs origin/main || git rebase --abort
            sleep 3
          done
          echo "No se pudo hacer push tras varios intentos." && exit 1
