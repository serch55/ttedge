<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Edge</title>
<script>(function(){var t=localStorage.getItem('ttedge_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  :root{
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --radius:14px;
  }
  /* ---------- TEMA OSCURO (por defecto) ---------- */
  [data-theme="dark"]{
    --bg:#0a0d14; --panel:#10141e; --panel2:#141925; --line:#222a3a; --line2:#2c3548;
    --txt:#e6eaf2; --txt2:#c2c9d6; --mut:#7e8aa0;
    --primary:#5878aa; --primary-soft:rgba(88,120,170,.16);
    --pos:#54a884; --neg:#cc6a6a; --warn:#b89653; --score:#c2a35e;
    --c-blue:#5a82c4; --c-green:#54a884; --c-gold:#b89653; --c-purple:#9a8bd0; --c-coral:#c2785c;
    --shadow:0 8px 30px rgba(0,0,0,.40);
    --bgglow1:rgba(40,58,92,.22); --bgglow2:rgba(30,40,64,.18);
  }
  /* ---------- TEMA CLARO ---------- */
  [data-theme="light"]{
    --bg:#f2efe8; --panel:#ffffff; --panel2:#faf8f3; --line:#e3ded3; --line2:#d6cfc0;
    --txt:#1b2230; --txt2:#3a4254; --mut:#717a8c;
    --primary:#3f5e95; --primary-soft:rgba(63,94,149,.10);
    --pos:#3f8c66; --neg:#b85656; --warn:#9a7c39; --score:#8f7430;
    --c-blue:#3f5e95; --c-green:#3f8c66; --c-gold:#9a7c39; --c-purple:#6f5fb0; --c-coral:#b06243;
    --shadow:0 6px 22px rgba(35,40,55,.08);
    --bgglow1:rgba(63,94,149,.05); --bgglow2:rgba(154,124,57,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);
    background:radial-gradient(1100px 560px at 82% -12%,var(--bgglow1) 0%,transparent 60%),
               radial-gradient(820px 480px at -8% 8%,var(--bgglow2) 0%,transparent 55%),var(--bg);
    color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:64px;
    transition:background-color .25s ease,color .25s ease}
  .wrap{max-width:1160px;margin:0 auto;padding:0 20px}

  /* ---------- HEADER ---------- */
  header.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;
    padding:32px 0 20px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  h1{font-size:23px;margin:0;letter-spacing:-.4px;font-weight:700}
  .stars{color:var(--score);letter-spacing:2px;font-size:15px;vertical-align:middle}
  .sub{color:var(--mut);font-size:12px;margin-top:6px;font-family:var(--mono);letter-spacing:.3px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .btn{cursor:pointer;font-family:var(--mono);font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;
    font-weight:600;border-radius:9px;padding:9px 14px;border:1px solid transparent;
    background:var(--primary);color:#fff;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--txt2);border-color:var(--line2)}
  .btn.ghost:hover{background:var(--primary-soft);color:var(--txt);filter:none}
  .btn.icon{padding:9px 11px;background:transparent;color:var(--txt2);border-color:var(--line2);font-size:14px}
  .btn.icon:hover{background:var(--primary-soft)}

  /* ---------- SECCIONES ---------- */
  .statbar{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin:0 0 12px}
  .statbar #statTitle,.statbar #statTitle2{font-family:var(--mono);font-size:11.5px;font-weight:600;
    letter-spacing:1.4px;text-transform:uppercase;color:var(--txt2)}
  .statbar .statnote{font-family:var(--mono);font-size:11px;color:var(--mut);letter-spacing:.3px}

  /* ---------- KPIs ---------- */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:0 0 18px}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(3,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 14px 13px}
  .kpi .k{font-family:var(--mono);font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px}
  .kpi .v{font-family:var(--serif);font-size:25px;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.amb{color:var(--warn)}

  /* ---------- GRÁFICO ---------- */
  .chartcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px 8px;margin:0 0 22px}
  .charttitle{font-family:var(--mono);font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
  #chart{width:100%;height:auto;display:block;cursor:crosshair}
  #charttip{position:fixed;pointer-events:none;z-index:60;background:var(--panel);border:1px solid var(--line2);
    border-radius:9px;padding:8px 12px;font-family:var(--mono);font-size:11px;letter-spacing:.3px;color:var(--mut);
    box-shadow:var(--shadow);display:none;line-height:1.7;white-space:nowrap}
  #charttip .s{font-family:var(--serif);font-size:15px;font-weight:600}

  /* ---------- PANEL SEMANA / FINDE ---------- */
  .wkpanel{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 24px}
  @media(max-width:560px){.wkpanel{grid-template-columns:1fr}}
  .wkcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
  .wkcard::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%}
  .wkcard.week::before{background:var(--primary)}
  .wkcard.wend::before{background:var(--c-gold)}
  .wkhead{display:flex;align-items:center;gap:9px;margin-bottom:13px}
  .wkhead .ico{font-size:14px;opacity:.85}
  .wkhead .ttl{font-size:13px;font-weight:700;letter-spacing:-.2px}
  .wkhead .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase}
  .wkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .wkm .k{font-family:var(--mono);font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .wkm .v{font-family:var(--serif);font-size:19px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}
  .wknote{font-family:var(--mono);font-size:10px;color:var(--mut);margin-top:10px;letter-spacing:.3px}

  /* ---------- TOOLBAR / CHIPS ---------- */
  .toolbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:0 0 16px}
  .toolbar .lbl-inline{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin-right:4px}
  .chip{padding:6px 13px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
    color:var(--mut);cursor:pointer;font-size:12px;font-weight:600;transition:.15s;user-select:none}
  .chip:hover{border-color:var(--line2);color:var(--txt2)}
  .chip.active{background:var(--primary);color:#fff;border-color:transparent}
  select{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:7px 11px;font-size:12px;font-family:var(--sans);outline:none;cursor:pointer}

  /* ---------- TARJETAS DE PARTIDO ---------- */
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;transition:border-color .15s}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--pos)}
  .card.under::before{background:var(--warn)}
  .card.spread::before{background:var(--c-purple)}
  .card.win{border-color:color-mix(in srgb,var(--pos) 45%,var(--line))}
  .card.loss{border-color:color-mix(in srgb,var(--neg) 40%,var(--line))}
  .row1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
  .league{font-family:var(--mono);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;padding:3px 8px;border-radius:6px}
  .lg-tte{color:var(--c-blue);background:color-mix(in srgb,var(--c-blue) 13%,transparent)}
  .lg-cup{color:var(--c-coral);background:color-mix(in srgb,var(--c-coral) 13%,transparent)}
  .lg-cz{color:var(--c-green);background:color-mix(in srgb,var(--c-green) 14%,transparent)}
  .lg-setka{color:var(--c-gold);background:color-mix(in srgb,var(--c-gold) 15%,transparent)}
  .confbadge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.7px;padding:3px 7px;border-radius:6px;color:var(--warn);background:color-mix(in srgb,var(--warn) 16%,transparent)}
  .donebadge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.6px;padding:3px 7px;border-radius:6px;color:var(--primary);background:var(--primary-soft)}
  .donechk{display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:var(--mut);user-select:none;padding:2px 0}
  .donechk input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;margin:0}
  .donechk.on{color:var(--primary);font-weight:600}
  .card.done{border-color:color-mix(in srgb,var(--primary) 50%,var(--line))}
  .date{font-family:var(--mono);font-size:10.5px;color:var(--mut)}
  .time{font-family:var(--mono);font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
  .players{font-size:16px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
  .players .vs{color:var(--mut);font-weight:500;font-size:12px;margin:0 5px}
  .pick{display:flex;align-items:center;justify-content:center;text-align:center;width:100%;margin-top:11px;padding:11px 14px;border-radius:9px}
  .pick.over{background:color-mix(in srgb,var(--pos) 10%,transparent);border:1px solid color-mix(in srgb,var(--pos) 32%,transparent)}
  .pick.under{background:color-mix(in srgb,var(--warn) 11%,transparent);border:1px solid color-mix(in srgb,var(--warn) 34%,transparent)}
  .pick.spread{background:color-mix(in srgb,var(--c-purple) 11%,transparent);border:1px solid color-mix(in srgb,var(--c-purple) 32%,transparent)}
  .pick .big{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:-.2px}
  .pick .lineinp{font-family:var(--serif);font-size:19px;font-weight:600;color:inherit;background:transparent;
    border:none;border-bottom:1px dashed color-mix(in srgb,currentColor 45%,transparent);width:3.4em;text-align:center;
    padding:0 2px;outline:none;font-variant-numeric:tabular-nums;cursor:text}
  .pick .lineinp:hover,.pick .lineinp:focus{border-bottom-color:currentColor}
  .pick.over .big{color:var(--pos)}.pick.under .big{color:var(--warn)}.pick.spread .big{color:var(--c-purple)}
  .lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);font-weight:600}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .m{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 6px;text-align:center}
  .m .k{font-family:var(--mono);font-size:8.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
  .m .v{font-family:var(--serif);font-size:15px;font-weight:600;margin-top:2px}
  .track{margin-top:13px;padding-top:13px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
  .oddsrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .oddsrow input{width:74px;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:7px 9px;font-size:12px;font-family:var(--mono);outline:none}
  .oddsrow input:focus{border-color:var(--primary)}
  .oddsrow .pl{margin-left:auto}
  .searchlink{font-family:var(--mono);font-size:10.5px;color:var(--primary);text-decoration:none;letter-spacing:.3px}
  .searchlink:hover{text-decoration:underline}
  .results{display:flex;gap:7px}
  .rbtn{flex:1;text-align:center;padding:8px 0;border-radius:8px;border:1px solid var(--line);background:var(--panel2);
    color:var(--mut);cursor:pointer;font-size:12px;font-weight:700;user-select:none;transition:.15s}
  .rbtn:hover{border-color:var(--line2)}
  .rbtn.win.on{background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos);border-color:color-mix(in srgb,var(--pos) 45%,transparent)}
  .rbtn.loss.on{background:color-mix(in srgb,var(--neg) 16%,transparent);color:var(--neg);border-color:color-mix(in srgb,var(--neg) 42%,transparent)}
  .rbtn.pend.on{background:var(--panel2);color:var(--txt);border-color:var(--mut)}
  .rbtn.restore{background:var(--primary-soft);color:var(--primary);border-color:color-mix(in srgb,var(--primary) 40%,transparent)}
  .delrow{display:flex;justify-content:center;margin-top:1px}
  .dellink{font-family:var(--mono);font-size:10px;color:var(--mut);cursor:pointer;opacity:.7;transition:.15s;user-select:none;letter-spacing:.3px;text-transform:uppercase}
  .dellink:hover{opacity:1;color:var(--neg)}
  .card.deleted{opacity:.55}
  .pl{font-family:var(--mono);font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .empty{color:var(--mut);text-align:center;padding:44px;font-size:13px;grid-column:1/-1;font-family:var(--mono)}
  .note{color:var(--mut);font-size:11px;text-align:center;margin-top:30px;line-height:1.8;font-family:var(--mono);letter-spacing:.2px}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="brand">
      <h1>TT Edge</h1>
      <div class="sub" id="sub">Cargando…</div>
    </div>
    <div class="actions">
      <button class="btn" id="refreshBtn" onclick="forceRefresh()">Actualizar</button>
      <button class="btn ghost" id="syncBtn" onclick="setupSync()" title="Sincroniza tus marcas entre dispositivos">Sincronizar</button>
      <button class="btn icon" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema claro / oscuro">◐</button>
    </div>
  </header>

  <div class="statbar"><span id="statTitle">Estadísticas · todas las ligas</span><span class="statnote">Stake plano 50€</span></div>
  <div class="kpis" id="kpis"></div>

  <div class="chartcard">
    <div class="charttitle">Evolución del beneficio (€)</div>
    <canvas id="chart" width="1100" height="220"></canvas>
  </div>
  <div id="charttip"></div>

  <div class="statbar"><span id="statTitle2">Entre semana vs. fin de semana</span></div>
  <div class="wkpanel" id="wkpanel"></div>

  <div class="toolbar">
    <span class="chip tchip active" data-type="all">Todas</span>
    <span class="chip tchip" data-type="over">Over</span>
    <span class="chip tchip" data-type="under">Under</span>
    <span class="chip tchip" data-type="spread">Spread</span>
    <span style="width:6px"></span>
    <span class="chip rchip active" data-res="all">Todo</span>
    <span class="chip rchip" data-res="pending">Pendientes</span>
    <span class="chip rchip" data-res="graded">Evaluadas</span>
    <span class="chip rchip" data-res="deleted">Eliminadas</span>
    <span style="width:6px"></span>
    <span class="chip schip active" id="score85chip">Score ≥ 85</span>
    <span style="width:6px"></span>
    <select id="day"></select>
  </div>
  <div class="toolbar">
    <span class="lbl-inline">Periodo</span>
    <span class="chip pchip active" data-period="all">Todo</span>
    <span class="chip pchip" data-period="week">Entre semana</span>
    <span class="chip pchip" data-period="wend">Fin de semana</span>
  </div>
  <div class="toolbar">
    <span class="lbl-inline">Ligas</span>
    <span class="chip lgchip active" data-lg="all">Todas</span>
    <span class="chip lgchip" data-lg="TT Elite Series">TT Elite</span>
    <span class="chip lgchip" data-lg="Czech Liga Pro">Czech Liga Pro</span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const STORE='ttedge_tracking_v1';
const STAKE=50;        // apuesta fija por evento (€)
const DEF_ODDS=1.83;   // cuota por defecto
const lgClass=l=>l==="TT Elite Series"?"lg-tte":l==="TT Cup"?"lg-cup":l==="Czech Liga Pro"?"lg-cz":"lg-setka";
let DATA=[], track={}, fType="all", fRes="all", fLeagues=[], fDay="all", fScore85=true, fPeriod="all";
const passScore=d=>!fScore85 || (d.score!=null && d.score>=85);
const passLeague=d=>fLeagues.length===0 || fLeagues.includes(d.league);
const passExcl=d=> d.league!=='Setka Cup'                           // ocultar TODA la liga Setka Cup
  && d.league!=='TT Cup'                                            // ocultar toda la liga TT Cup
  && !(d.type==='spread' && (d.conf||'ultra')==='high');           // ocultar todos los spreads High
const notDeleted=d=>!(track[d.id] && track[d.id].deleted);          // ocultar picks eliminados
const isWeekend=d=>{ const g=new Date((d.date||'')+'T12:00:00').getDay(); return g===0||g===6; };
const passPeriod=d=>fPeriod==='all'||(fPeriod==='week'?!isWeekend(d):isWeekend(d));  // Todo / Entre semana / Finde
const passDay=d=>fDay==='all'||d.date===fDay;                                        // filtro de fecha

/* ---------- TEMA CLARO / OSCURO ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('ttedge_theme',t); }catch(e){}
  const b=document.getElementById('themeBtn'); if(b) b.textContent = (t==='light'?'☾':'☀');
  if(typeof drawChart==='function') drawChart();
}
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme')||'dark'; applyTheme(cur==='dark'?'light':'dark'); }

function loadTrack(){ try{ track=JSON.parse(localStorage.getItem(STORE))||{}; }catch(e){ track={}; } }
function saveTrack(){ localStorage.setItem(STORE, JSON.stringify(track)); }
function t(id){ return track[id] || (track[id]={result:'pending', odds:'', close:''}); }

function setResult(id,r){ const x=t(id); x.result=(x.result===r?'pending':r); saveTrack(); pushCloud(); render(); }
function setOdds(id,v){ const x=t(id); x.odds=v; saveTrack(); pushCloud(); renderKpis(); render(); }
function setClose(id,v){ const x=t(id); x.close=v; saveTrack(); pushCloud(); renderKpis(); }
function setPlaced(id,v){ const x=t(id); x.placed=v; saveTrack(); pushCloud(); render(); }
function setLine(id,el){ const n=parseFloat(String(el.value).replace(',','.')); if(!isNaN(n)){ const x=t(id); x.line=n; el.value=String(n).replace('.',','); saveTrack(); pushCloud(); } }
function delPick(id){ const x=t(id); x.deleted=true; saveTrack(); pushCloud(); render(); }
function restorePick(id){ const x=t(id); x.deleted=false; saveTrack(); pushCloud(); render(); }

/* ---------- SINCRONIZACIÓN EN LA NUBE (marcas entre dispositivos) ---------- */
let SYNC = localStorage.getItem('ttedge_sync') || '';
function updateSyncBtn(){ const b=document.getElementById('syncBtn'); if(b) b.textContent = SYNC ? SYNC : 'Sincronizar'; }
function setupSync(){
  const c = prompt('Código de sincronización.\nInvéntate uno (ej: "sergio2026") y usa EL MISMO en el móvil para ver tus marcas en todos lados.', SYNC);
  if(c===null) return;
  SYNC = (c||'').trim().replace(/[^a-zA-Z0-9_-]/g,'');
  localStorage.setItem('ttedge_sync', SYNC);
  updateSyncBtn();
  if(SYNC){ pullCloud(); alert('Sincronización activada con el código "'+SYNC+'".\nUsa el mismo código en tus otros dispositivos.'); }
}
async function pullCloud(){
  if(!SYNC) return;
  try{
    const r = await fetch('/api/tracking?key='+encodeURIComponent(SYNC), {cache:'no-store'});
    const j = await r.json();
    const cloud = j.data || {};
    if(Object.keys(cloud).length){ track = cloud; saveTrack(); render(); }     // la nube manda
    else if(Object.keys(track).length){ pushCloud(); }                          // nube vacía: subo lo local
  }catch(e){}
}
let _pushT;
function pushCloud(){
  if(!SYNC) return;
  clearTimeout(_pushT);
  _pushT = setTimeout(()=>{ fetch('/api/tracking?key='+encodeURIComponent(SYNC),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(track)}).catch(()=>{}); }, 700);
}

function stats(rows){
  let win=0,loss=0,pend=0,profit=0,clvSum=0,clvN=0,oWin=0,oLoss=0,uWin=0,uLoss=0;
  for(const d of rows){
    const x=track[d.id]||{};
    const res=x.result||'pending';
    const odd=parseFloat(x.odds)||DEF_ODDS;
    if(res==='win'){ win++; profit+=STAKE*(odd-1); d.type==='over'?oWin++:uWin++; }
    else if(res==='loss'){ loss++; profit-=STAKE; d.type==='over'?oLoss++:uLoss++; }
    else pend++;
    const close=parseFloat(x.close)||1.83;   // línea de cierre fija por defecto 1,83
    if(close>1 && odd>1){ clvSum+=(odd/close-1)*100; clvN++; }
  }
  const graded=win+loss, staked=STAKE*graded;
  return {
    total:rows.length, graded, win, loss, pend,
    acc: graded?Math.round(win/graded*100):null,
    oAcc:(oWin+oLoss)?Math.round(oWin/(oWin+oLoss)*100):null,
    uAcc:(uWin+uLoss)?Math.round(uWin/(uWin+uLoss)*100):null,
    staked, profit, yield: graded?(profit/staked*100):null,
    clv: clvN?(clvSum/clvN):null
  };
}
function renderKpis(){
  const rows=DATA.filter(d=>passLeague(d)&&(fType==='all'||d.type===fType)&&passScore(d)&&passExcl(d)&&notDeleted(d)&&passPeriod(d)&&passDay(d));
  const s=stats(rows);
  const eur=n=>(n>=0?'+':'−')+'€'+Math.abs(n).toFixed(2);
  const cls=n=>n>0?'pos':n<0?'neg':'';
  const perTxt=fPeriod==='week'?' · entre semana':fPeriod==='wend'?' · fin de semana':'';
  const dayTxt=fDay==='all'?'':' · '+fDay;
  document.getElementById('statTitle').textContent='Estadísticas · '+(fLeagues.length===0?'todas las ligas':fLeagues.join(' + '))+(fType==='all'?'':' · solo '+fType)+perTxt+dayTxt;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="k">Apuestas</div><div class="v">${s.total}</div></div>
    <div class="kpi"><div class="k">Evaluadas</div><div class="v">${s.graded}</div></div>
    <div class="kpi"><div class="k">Ganadas</div><div class="v pos">${s.win}</div></div>
    <div class="kpi"><div class="k">Perdidas</div><div class="v neg">${s.loss}</div></div>
    <div class="kpi"><div class="k">Pendientes</div><div class="v amb">${s.pend}</div></div>
    <div class="kpi"><div class="k">% Acierto</div><div class="v ${s.acc>=50?'pos':s.acc==null?'':'neg'}">${s.acc==null?'—':s.acc+'%'}</div></div>
    <div class="kpi"><div class="k">Apostado</div><div class="v">${s.graded?('€'+s.staked.toFixed(0)):'—'}</div></div>
    <div class="kpi"><div class="k">Beneficio</div><div class="v ${cls(s.profit)}">${s.graded?eur(s.profit):'—'}</div></div>
    <div class="kpi"><div class="k">Yield / ROI</div><div class="v ${s.yield==null?'':cls(s.yield)}">${s.yield==null?'—':(s.yield>=0?'+':'')+s.yield.toFixed(1)+'%'}</div></div>
    <div class="kpi"><div class="k">CLV medio</div><div class="v ${s.clv==null?'':cls(s.clv)}">${s.clv==null?'—':(s.clv>=0?'+':'')+s.clv.toFixed(1)+'%'}</div></div>
    <div class="kpi"><div class="k">Acierto Over</div><div class="v">${s.oAcc==null?'—':s.oAcc+'%'}</div></div>
    <div class="kpi"><div class="k">Acierto Under</div><div class="v">${s.uAcc==null?'—':s.uAcc+'%'}</div></div>`;
  drawChart();
  renderWeek();
}
function renderWeek(){
  const base=DATA.filter(d=>passLeague(d)&&(fType==='all'||d.type===fType)&&passScore(d)&&passExcl(d)&&notDeleted(d)&&passDay(d));
  const week=base.filter(d=>!isWeekend(d)), wend=base.filter(d=>isWeekend(d));
  const eur=n=>(n>=0?'+':'−')+'€'+Math.abs(n).toFixed(2);
  const cls=n=>n>0?'pos':n<0?'neg':'';
  const block=rows=>{ const s=stats(rows);
    return `<div class="wkgrid">
      <div class="wkm"><div class="k">Apuestas</div><div class="v">${s.total}</div></div>
      <div class="wkm"><div class="k">% Acierto</div><div class="v ${s.acc==null?'':s.acc>=50?'pos':'neg'}">${s.acc==null?'—':s.acc+'%'}</div></div>
      <div class="wkm"><div class="k">Beneficio</div><div class="v ${cls(s.profit)}" style="font-size:16px">${s.graded?eur(s.profit):'—'}</div></div>
      <div class="wkm"><div class="k">Yield</div><div class="v ${s.yield==null?'':cls(s.yield)}">${s.yield==null?'—':(s.yield>=0?'+':'')+s.yield.toFixed(1)+'%'}</div></div>
    </div>
    <div class="wknote">Evaluadas ${s.graded} · ✓ ${s.win} · ✗ ${s.loss} · ⏳ ${s.pend}</div>`;
  };
  document.getElementById('wkpanel').innerHTML=`
    <div class="wkcard week"><div class="wkhead"><span class="ttl">Entre semana</span><span class="cnt">Lun – Vie</span></div>${block(week)}</div>
    <div class="wkcard wend"><div class="wkhead"><span class="ttl">Fin de semana</span><span class="cnt">Sáb – Dom</span></div>${block(wend)}</div>`;
}
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function hexA(hex,a){ hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const n=parseInt(hex,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
let CHART={pts:[],lineCol:null};
function drawChart(){
  const c=document.getElementById('chart'); if(!c) return;
  const ctx=c.getContext('2d'); const W=c.width, H=c.height; ctx.clearRect(0,0,W,H);
  CHART.pts=[];
  const cPos=cssVar('--pos')||'#54a884', cNeg=cssVar('--neg')||'#cc6a6a',
        cLine=cssVar('--line')||'#222a3a', cMut=cssVar('--mut')||'#7e8aa0', cWarn=cssVar('--warn')||'#b89653';
  let rows=DATA.filter(d=>passLeague(d)&&(fType==='all'||d.type===fType)&&passScore(d)&&passExcl(d)&&notDeleted(d)&&passPeriod(d)&&passDay(d))
    .filter(d=>['win','loss'].includes(track[d.id]&&track[d.id].result))
    .sort((a,b)=>((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')));
  let cum=0; const pts=[0];
  for(const d of rows){ const x=track[d.id]; const odd=parseFloat(x.odds)||DEF_ODDS; cum += x.result==='win'?STAKE*(odd-1):-STAKE; pts.push(cum); }
  const pad=30, min=Math.min(0,...pts), max=Math.max(0,...pts), rng=(max-min)||1;
  const X=i=>pad+i*(W-2*pad)/Math.max(1,pts.length-1);
  const Y=v=>H-pad-(v-min)/rng*(H-2*pad);
  // bandas de fin de semana (solo cuando se ven Todos los días)
  if(fPeriod==='all'){ ctx.fillStyle=hexA(cWarn,.13);
    for(let k=0;k<rows.length;k++){ if(isWeekend(rows[k])) ctx.fillRect(X(k),pad,X(k+1)-X(k),H-2*pad); } }
  ctx.strokeStyle=cLine; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad,Y(0)); ctx.lineTo(W-pad,Y(0)); ctx.stroke(); ctx.setLineDash([]);
  if(pts.length<2){ ctx.fillStyle=cMut; ctx.font='13px ui-monospace,monospace'; ctx.fillText('Marca resultados para ver la evolución.', pad, H/2); return; }
  const up=cum>=0, lineCol=up?cPos:cNeg;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, hexA(lineCol,.28)); grad.addColorStop(1, hexA(lineCol,0));
  ctx.beginPath(); ctx.moveTo(X(0),Y(pts[0])); pts.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.lineTo(X(pts.length-1),H-pad); ctx.lineTo(X(0),H-pad); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(X(0),Y(pts[0])); pts.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.strokeStyle=lineCol; ctx.lineWidth=2.5; ctx.stroke();
  pts.forEach((v,i)=>{ ctx.beginPath(); ctx.arc(X(i),Y(v),2.2,0,7); ctx.fillStyle=lineCol; ctx.fill(); });
  ctx.fillStyle=cMut; ctx.font='11px ui-monospace,monospace';
  ctx.fillText('€'+max.toFixed(0),4,Y(max)+10); ctx.fillText('€'+min.toFixed(0),4,Y(min)-2);
  ctx.fillStyle=lineCol; ctx.font='bold 14px ui-monospace,monospace';
  ctx.fillText((cum>=0?'+':'−')+'€'+Math.abs(cum).toFixed(2), W-pad-92, Math.max(16,Y(pts[pts.length-1])-8));
  // guardar puntos para el hover interactivo
  CHART.lineCol=lineCol;
  CHART.pts=pts.map((v,i)=>({cx:X(i), cy:Y(v), cum:v, date:i?(rows[i-1].date||''):'', time:i?(rows[i-1].time||''):''}));
}
function chartHover(e){
  const c=document.getElementById('chart'), tip=document.getElementById('charttip');
  if(!c||!tip) return;
  if(!CHART.pts.length){ tip.style.display='none'; return; }
  const rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(c.width/rect.width);
  let bi=0, bd=1e9; CHART.pts.forEach((p,i)=>{ const d=Math.abs(p.cx-mx); if(d<bd){ bd=d; bi=i; } });
  const p=CHART.pts[bi];
  drawChart();                                  // redibuja base y borra el cursor anterior
  const ctx=c.getContext('2d');
  ctx.save();
  ctx.strokeStyle=cssVar('--mut')||'#888'; ctx.globalAlpha=.45; ctx.setLineDash([3,3]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(p.cx,14); ctx.lineTo(p.cx,c.height-26); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(p.cx,p.cy,4.5,0,7); ctx.fillStyle=CHART.lineCol||cssVar('--pos'); ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle=cssVar('--panel')||'#000'; ctx.stroke();
  ctx.restore();
  const saldo=(p.cum>=0?'+':'−')+'€'+Math.abs(p.cum).toFixed(2);
  const col=p.cum>0?'var(--pos)':p.cum<0?'var(--neg)':'var(--txt)';
  const head=(bi===0)?'Inicio':`${p.date} · ${p.time}`;
  tip.innerHTML=`${head}<br><span class="s" style="color:${col}">Saldo ${saldo}</span>`;
  tip.style.display='block';
  let L=e.clientX+14, T=e.clientY+14; const tw=tip.offsetWidth, th=tip.offsetHeight;
  if(L+tw>window.innerWidth-8) L=e.clientX-tw-14;
  if(T+th>window.innerHeight-8) T=e.clientY-th-14;
  tip.style.left=L+'px'; tip.style.top=T+'px';
}
function chartLeave(){ const tip=document.getElementById('charttip'); if(tip) tip.style.display='none'; drawChart(); }

// Enlaces de búsqueda (resultado y cuotas) por los nombres de los jugadores.
function searchURL(d){ return 'https://www.google.com/search?q='+encodeURIComponent(`betsapi ${d.home} ${d.away} cuotas`); }
function resultURL(d){ return 'https://www.google.com/search?q='+encodeURIComponent(`betsapi ${d.home} ${d.away} resultado`); }

function render(){
  renderKpis();
  let rows=DATA.filter(d=>(fType==='all'||d.type===fType)&&passLeague(d)&&(fDay==='all'||d.date===fDay)&&passScore(d)&&passExcl(d)&&passPeriod(d));
  if(fRes==='deleted'){ rows=rows.filter(d=>track[d.id]&&track[d.id].deleted); }
  else { rows=rows.filter(d=>notDeleted(d)); }
  if(fRes==='pending') rows=rows.filter(d=>(track[d.id]?.result||'pending')==='pending');
  if(fRes==='graded') rows=rows.filter(d=>['win','loss'].includes(track[d.id]?.result));
  const g=document.getElementById('grid');
  if(!rows.length){ g.innerHTML='<div class="empty">'+(fRes==='deleted'?'No hay picks eliminados.':'No hay partidos con ese filtro.')+'</div>'; return; }
  const fmtN=n=>String(n).replace('-','−').replace('.',',');
  g.innerHTML=rows.map(d=>{
    const isU=d.type==='under', isSp=d.type==='spread', col=isSp?'var(--c-purple)':isU?'var(--warn)':'var(--pos)';
    const cardCls=isSp?'spread':isU?'under':'', pickCls=isSp?'spread':isU?'under':'over';
    const x=track[d.id]||{result:'pending',odds:'',close:''};
    const odd=parseFloat(x.odds)||1.83;  // cuota fija por defecto 1.83
    const line = x.line!=null ? x.line : (isU?71.5:77.5);  // línea editable (def. 77,5 over / 71,5 under)
    let pl='';
    if(x.result==='win'||x.result==='loss'){ const e=x.result==='win'?STAKE*(odd-1):-STAKE; pl=`<span class="pl ${e>=0?'pos':'neg'}">${e>=0?'+':'−'}€${Math.abs(e).toFixed(2)}</span>`; }
    const pickBlock = isSp
      ? `<div class="pick spread"><span class="big" style="font-size:16px">${d.pick||'—'}</span></div>`
      : `<div class="pick ${pickCls}"><span class="big">${isU?'UNDER':'OVER'} <input class="lineinp" type="text" inputmode="decimal" value="${fmtN(line)}" onchange="setLine('${d.id}',this)" title="Editar la línea"></span></div>`;
    const metricsBlock = isSp
      ? `<div class="metrics">
           <div class="m"><div class="k">Hándicap</div><div class="v" style="color:${col}">${d.spread!=null?fmtN(d.spread):'—'}</div></div>
           <div class="m"><div class="k">L5</div><div class="v">${d.l5!=null?fmtN(d.l5):'—'}</div></div>
           <div class="m"><div class="k">Score</div><div class="v" style="color:var(--score)">${d.score!=null?d.score:'—'}</div></div>
         </div>`
      : `<div class="metrics">
           <div class="m"><div class="k">% ${isU?'Under':'Over'}</div><div class="v" style="color:${col}">${d.pct}%</div></div>
           <div class="m"><div class="k">3+ sets</div><div class="v">${d.sets3!=null?d.sets3+'%':'—'}</div></div>
           <div class="m"><div class="k">Score</div><div class="v" style="color:var(--score)">${d.score!=null?d.score:'—'}</div></div>
         </div>`;
    return `<div class="card ${cardCls} ${x.placed?'done':''} ${x.deleted?'deleted':''} ${x.result==='win'?'win':x.result==='loss'?'loss':''}">
      <div class="row1">
        <span style="display:flex;align-items:center;gap:6px"><span class="league ${lgClass(d.league)}">${d.league||''}</span>${d.conf==='high'?'<span class="confbadge">HIGH</span>':''}${x.placed?'<span class="donebadge">✓ Realizada</span>':''}</span>
        <span><span class="date">${d.date||''}</span> &nbsp;<span class="time">${d.time||'--:--'}</span></span>
      </div>
      <div class="players">${d.home}<span class="vs">vs</span>${d.away}</div>
      ${pickBlock}
      ${metricsBlock}
      <div class="track">
        <div class="oddsrow">
          <span class="lbl">Cuota</span>
          <input type="number" step="0.01" placeholder="1.83" value="${x.odds||'1.83'}" onchange="setOdds('${d.id}',this.value)">
          <span class="lbl" title="Cuota de cierre, para el CLV">Cierre</span>
          <input type="number" step="0.01" placeholder="1.83" value="${x.close||'1.83'}" onchange="setClose('${d.id}',this.value)">
          ${pl}
        </div>
        <div class="oddsrow" style="justify-content:flex-end">
          <a class="searchlink" href="${resultURL(d)}" target="_blank" rel="noopener">buscar resultado ↗</a>
        </div>
        ${x.deleted ? '' : `<label class="donechk ${x.placed?'on':''}"><input type="checkbox" ${x.placed?'checked':''} onchange="setPlaced('${d.id}',this.checked)"><span>Apuesta realizada</span></label>`}
        ${x.deleted
          ? `<div class="results"><div class="rbtn restore on" onclick="restorePick('${d.id}')">↺ Restaurar pick</div></div>`
          : `<div class="results">
          <div class="rbtn win ${x.result==='win'?'on':''}" onclick="setResult('${d.id}','win')">✓ Acertó</div>
          <div class="rbtn loss ${x.result==='loss'?'on':''}" onclick="setResult('${d.id}','loss')">✗ Falló</div>
          <div class="rbtn pend ${(!x.result||x.result==='pending')?'on':''}" onclick="setResult('${d.id}','pending')">⏳</div>
        </div>
        <div class="delrow"><span class="dellink" onclick="if(confirm('¿Eliminar este pick? No contará en las estadísticas. Podrás recuperarlo en el filtro \\'Eliminadas\\'.'))delPick('${d.id}')">Eliminar pick</span></div>`}
      </div>
    </div>`;}).join('');
}

function fillDays(){
  const days=[...new Set(DATA.map(d=>d.date))].sort().reverse();
  const sel=document.getElementById('day');
  sel.innerHTML='<option value="all">Todas las fechas</option>'+days.map(d=>`<option value="${d}">${d}</option>`).join('');
}
let refreshing=false;
async function forceRefresh(){
  if(refreshing) return;
  const btn=document.getElementById('refreshBtn');
  refreshing=true; const orig=btn.textContent; btn.textContent='Lanzando…'; btn.style.opacity='.7';
  try{
    const r=await fetch('/api/refresh',{method:'POST'});
    const j=await r.json().catch(()=>({}));
    if(r.ok && j.ok){
      btn.textContent='Lanzado ✓';
      alert('Robot lanzado. Tarda ~2-3 minutos en buscar los partidos y publicarlos.\nEspera un poco y recarga (F5) para ver las novedades.');
    } else {
      btn.textContent='Error';
      alert('No se pudo lanzar: '+(j.error||('HTTP '+r.status))+'\n\nSi acabas de desplegar, revisa que en Vercel están las variables GH_PAT y GH_REPO (ver guía).');
    }
  }catch(e){
    btn.textContent='Sin conexión';
    alert('No se pudo contactar con el servidor. ¿Has añadido la función y las variables en Vercel? (ver guía)');
  }
  setTimeout(()=>{ btn.textContent=orig; btn.style.opacity='1'; refreshing=false; }, 8000);
}
function exportData(){ const blob=new Blob([JSON.stringify(track,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ttedge-registro-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); }
function importData(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ track=JSON.parse(r.result); saveTrack(); render(); alert('Registro restaurado.'); }catch(_){ alert('Archivo no válido.'); } }; r.readAsText(f); }

document.querySelectorAll('.tchip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.tchip').forEach(x=>x.classList.remove('active'));c.classList.add('active');fType=c.dataset.type;render();});
document.querySelectorAll('.rchip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.rchip').forEach(x=>x.classList.remove('active'));c.classList.add('active');fRes=c.dataset.res;render();});
document.querySelectorAll('.pchip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.pchip').forEach(x=>x.classList.remove('active'));c.classList.add('active');fPeriod=c.dataset.period;render();});
function paintLeagueChips(){ document.querySelectorAll('.lgchip').forEach(c=>{ const lg=c.dataset.lg; const on= lg==='all' ? fLeagues.length===0 : fLeagues.includes(lg); c.classList.toggle('active',on); }); }
document.querySelectorAll('.lgchip').forEach(c=>c.onclick=()=>{
  const lg=c.dataset.lg;
  if(lg==='all'){ fLeagues=[]; }
  else { const i=fLeagues.indexOf(lg); if(i>=0) fLeagues.splice(i,1); else fLeagues.push(lg); }
  paintLeagueChips(); render();
});
document.getElementById('score85chip').onclick=function(){ fScore85=!fScore85; this.classList.toggle('active',fScore85); render(); };
document.getElementById('day').onchange=e=>{fDay=e.target.value;render();};
(function(){ const cv=document.getElementById('chart'); if(cv){ cv.addEventListener('mousemove',chartHover); cv.addEventListener('mouseleave',chartLeave); } })();

// inicializar icono del botón de tema según el tema actual
applyTheme(document.documentElement.getAttribute('data-theme')||'dark');

loadTrack(); updateSyncBtn();
fetch('data/history.json?ts='+Date.now()).then(r=>r.json()).then(j=>{
  DATA=j.matches||[];
  const d=j.generated?new Date(j.generated):null;
  document.getElementById('sub').textContent=`${j.totalCount||DATA.length} predicciones · act. ${d?d.toLocaleString('es-ES'):'—'}`;
  fillDays(); render(); pullCloud();
}).catch(()=>{ document.getElementById('sub').textContent='Aún sin datos (el robot los generará en breve).'; render(); pullCloud(); });
</script>
